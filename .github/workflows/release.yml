name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  appimage:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      # Le submodule apps/socketspy est en HTTPS public → checkout natif.
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build git pkg-config patchelf libfuse2 \
            qt6-base-dev qt6-charts-dev qt6-declarative-dev \
            qt6-serialbus-dev qt6-serialport-dev qt6-connectivity-dev \
            qt6-tools-dev qt6-tools-dev-tools libqt6opengl6-dev \
            libgl1-mesa-dev libssl-dev \
            libusb-1.0-0-dev libgit2-dev \
            lua5.4 liblua5.4-dev \
            nlohmann-json3-dev libgtest-dev \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-xkb1 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-util1 libegl1 libgbm1

      - name: CMake configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DECU_MPPS_SIMULATION=OFF \
            -DECU_BUILD_TESTS=OFF \
            -DECU_BUILD_SOCKETSPY=OFF \
            -G Ninja

      - name: CMake build
        run: cmake --build build --target ecu_studio --parallel "$(nproc)"

      - name: Download linuxdeploy and Qt plugin
        run: |
          curl -fsSL -o /tmp/linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSL -o /tmp/linuxdeploy-plugin-qt \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x /tmp/linuxdeploy /tmp/linuxdeploy-plugin-qt

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # The install target only installs the binary to bin/; stage it in an
          # AppDir together with the .desktop file and icon for linuxdeploy.
          DESTDIR=/tmp/appdir cmake --install build
          # Bundle the Qt TLS plugin so HTTPS works inside the AppImage (the
          # in-app updater needs it) — linuxdeploy-plugin-qt skips it otherwise.
          QT_PLUGIN_DIR="$(qmake6 -query QT_INSTALL_PLUGINS 2>/dev/null || echo /usr/lib/x86_64-linux-gnu/qt6/plugins)"
          mkdir -p /tmp/appdir/usr/plugins/tls
          cp "${QT_PLUGIN_DIR}/tls/"*.so /tmp/appdir/usr/plugins/tls/ 2>/dev/null || true
          EXTRA_QT_MODULES="charts;serialbus;serialport;concurrent;sql;network;opengl" \
          QMAKE="$(command -v qmake6)" \
          /tmp/linuxdeploy \
            --appdir /tmp/appdir \
            --executable /tmp/appdir/usr/bin/ecu_studio \
            --desktop-file scripts/dist/ecu_studio.desktop \
            --icon-file scripts/dist/ecu_studio.png \
            --plugin qt \
            --output appimage
          # linuxdeploy peut déjà produire le bon nom : ne renomme que si besoin.
          produced="$(ls ECU*Studio*.AppImage | head -1)"
          if [ "$produced" != "ECU_Studio-x86_64.AppImage" ]; then
            mv "$produced" "ECU_Studio-x86_64.AppImage"
          fi
          ls -la ECU_Studio-x86_64.AppImage

      - name: Sign release manifest
        env:
          UPDATE_SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
        run: |
          if [ -z "$UPDATE_SIGNING_KEY" ]; then
            echo "::warning::UPDATE_SIGNING_KEY absent — AppImage publiée SANS manifeste signé."
            echo "L'AppImage reste téléchargeable ; seule la mise à jour intégrée auto est désactivée"
            echo "tant que le secret n'est pas défini."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          APPIMAGE="ECU_Studio-x86_64.AppImage"
          SHA256=$(sha256sum "$APPIMAGE" | awk '{print $1}')
          # Le manifeste doit référencer le NOM EXACT de l'asset attendu par
          # l'updater (Updater::startDownload reconstruit l'URL à partir de
          # version + filename).
          printf '{\n  "version": "%s",\n  "filename": "%s",\n  "sha256": "%s"\n}\n' \
              "$VERSION" "$APPIMAGE" "$SHA256" > release-manifest.json
          echo "$UPDATE_SIGNING_KEY" > /tmp/_sign_key.pem
          chmod 600 /tmp/_sign_key.pem
          # Signature Ed25519 « one-shot » (-rawin) du manifeste complet.
          openssl pkeyutl -sign -inkey /tmp/_sign_key.pem -rawin \
              -in release-manifest.json -out release-manifest.json.sig
          rm -f /tmp/_sign_key.pem
          echo "Manifest signed for v${VERSION} (sha256=${SHA256})"
          cat release-manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ECU_Studio-x86_64.AppImage
            release-manifest.json
            release-manifest.json.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
